global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    monitor: crsp

scrape_configs:
  - job_name: crsp-backend
    metrics_path: /metrics
    static_configs:
      - targets: [backend-1:8000, backend-2:8000]

  - job_name: otel-collector
    static_configs:
      - targets: [otel-collector:8889]

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]
