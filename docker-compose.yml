services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-crsp}
      POSTGRES_USER: ${POSTGRES_USER:-crsp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-crsp}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend-1: &backend
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql://crsp:crsp@postgres:5432/crsp
      POSTGRES_HOST: postgres
      POSTGRES_DB: crsp
      POSTGRES_USER: crsp
      POSTGRES_PASSWORD: crsp
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: "true"
      WEBSOCKET_REDIS_BRIDGE_ENABLED: "true"
      REGISTRATION_RATE_LIMIT_ENABLED: "true"
      REGISTRATION_RATE_LIMIT_PER_MINUTE: "60"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672//
      RABBITMQ_ENABLED: "true"
      METRICS_ENABLED: "true"
      OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
      SECRET_KEY: ${SECRET_KEY:-change-me-to-a-long-random-string}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  backend-2:
    <<: *backend

  worker:
    <<: *backend
    command: ["uv", "run", "celery", "-A", "app.modules.platform.celery_app.celery_app", "worker", "--loglevel=INFO"]

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8081}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend-1
      - backend-2

  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./observability/otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "${OTEL_GRPC_PORT:-4317}:4317"
      - "${OTEL_METRICS_PORT:-8889}:8889"

  prometheus:
    image: prom/prometheus:v2.55.1
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"

  grafana:
    image: grafana/grafana:11.3.0
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - ./observability/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./observability/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  postgres-data:
